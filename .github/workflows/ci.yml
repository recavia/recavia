name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

jobs:
  lint:
    name: Lint
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Show toolchain
        id: toolchain
        run: |
          toolchain="$(xcodebuild -version; swift --version)"
          echo "$toolchain"
          toolchain_hash="$(printf '%s' "$toolchain" | shasum -a 256 | awk '{ print $1 }')"
          echo "hash=$toolchain_hash" >> "$GITHUB_OUTPUT"

      - name: Cache BuildTools
        uses: actions/cache@v5
        with:
          path: BuildTools/.build
          key: buildtools-${{ runner.os }}-${{ runner.arch }}-${{ steps.toolchain.outputs.hash }}-${{ hashFiles('BuildTools/Package.resolved') }}

      - name: Install lint tools
        run: brew install swiftlint

      - name: Run lint
        run: ./scripts/lint.sh

  unit-tests:
    name: Unit Tests
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Show toolchain
        id: toolchain
        run: |
          toolchain="$(xcodebuild -version; swift --version)"
          echo "$toolchain"
          toolchain_hash="$(printf '%s' "$toolchain" | shasum -a 256 | awk '{ print $1 }')"
          echo "hash=$toolchain_hash" >> "$GITHUB_OUTPUT"

      - name: Restore app build cache
        id: app-build-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            .build/repositories
            .build/checkouts
            .build/workspace-state.json
            .build/*-apple-macosx/debug
          key: app-build-${{ runner.os }}-${{ runner.arch }}-${{ steps.toolchain.outputs.hash }}-${{ hashFiles('Package.swift', 'Package.resolved') }}

      - name: Run unit tests
        run: |
          set -o pipefail
          swift test 2>&1 | tee test-output.log

      - name: Verify tests executed
        run: grep -Eq "Test run with [1-9][0-9]* tests" test-output.log

      - name: Build executable
        run: swift build

      - name: Save app build cache
        if: ${{ !cancelled() && steps.app-build-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: |
            .build/repositories
            .build/checkouts
            .build/workspace-state.json
            .build/*-apple-macosx/debug
          key: ${{ steps.app-build-cache.outputs.cache-primary-key }}
